# DigitalOcean Functions project for the YardGuard quote-form email endpoint.
# Deploy with:  doctl serverless deploy functions/
# Env values below are interpolated from functions/.env at deploy time
# (that file is gitignored — secrets never land in the repo).

parameters: {}
packages:
  - name: api
    environment: {}
    functions:
      - name: quote
        binary: false
        runtime: 'nodejs:18'
        web: true
        webSecure: false
        parameters: {}
        environment:
          RESEND_API_KEY: "${RESEND_API_KEY}"
          LEAD_NOTIFY_EMAIL: "${LEAD_NOTIFY_EMAIL}"
          FROM_EMAIL: "${FROM_EMAIL}"
          ALLOWED_ORIGIN: "${ALLOWED_ORIGIN}"
          # BCC = blind copy (hidden from other recipients); set in .env.
          LEAD_BCC_EMAIL: "${LEAD_BCC_EMAIL}"
          # CC = visible copy. Empty by default (doctl can't substitute an empty
          # .env value); put an address here directly to enable, then redeploy.
          LEAD_CC_EMAIL: ""
        limits:
          timeout: 15000
          memory: 256
