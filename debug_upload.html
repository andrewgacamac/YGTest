<!DOCTYPE html>
<html>
<body>
    <input type="file" id="yardImage">
    <button onclick="testUpload()">Upload</button>
    <div id="output"></div>
    <script>
        const supabaseUrl = 'https://rjwaunghmcihpmockiap.supabase.co';
        const supabaseAnonKey = 'sb_publishable_2wpXUJklTjkVJGAJnb5Wqg_6DG55FRO';

        async function testUpload() {
            const output = document.getElementById('output');
            const file = document.getElementById('yardImage').files[0];
            if (!file) {
                output.innerText = "Please select a file first.";
                return;
            }

            const fileName = `test_folder/${Date.now()}_original.${file.name.split('.').pop()}`;
            const storageUrl = `${supabaseUrl}/storage/v1/object/raw_uploads/${fileName}`;

            output.innerText = "Uploading to " + storageUrl + "...";

            try {
                const response = await fetch(storageUrl, {
                    method: 'POST',
                    headers: {
                        'apikey': supabaseAnonKey,
                        'Authorization': `Bearer ${supabaseAnonKey}`,
                        'Content-Type': file.type || 'application/octet-stream',
                        'x-upsert': 'false'
                    },
                    body: file
                });

                const text = await response.text();
                output.innerText += "\n\nStatus: " + response.status + "\nResponse: " + text;
            } catch (e) {
                output.innerText += "\n\nError: " + e.message;
            }
        }
    </script>
</body>
</html>
