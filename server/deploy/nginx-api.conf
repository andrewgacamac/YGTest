# YardGuard: route the site's /api path to the local email backend.
#
# Paste this location block INSIDE your existing `server { ... }` block for
# ygtoronto.com (the same one that serves the static site), then:
#   sudo nginx -t && sudo systemctl reload nginx

location /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Yard photos are optional but can be several MB. nginx defaults to 1M,
    # which would reject uploads — raise it to match the backend's cap.
    client_max_body_size 20M;
}
